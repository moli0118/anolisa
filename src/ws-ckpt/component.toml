manifest_version = 2
anolisa_min_version = "0.1.12"

[component]
name = "ws-ckpt"
version = "0.4.0"
layer = "runtime"
description = "ws-ckpt adapters for OpenClaw and Hermes"

[install]
modes = ["system"]

[[adapters]]
framework = "openclaw"
name = "ws-ckpt-openclaw"
display_name = "ws-ckpt for OpenClaw"
adapter_type = "plugin"
trust = "first-party"
plugin_id = "ws-ckpt"
source = "scripts/openclaw"
dest = "{datadir}/runtime/ws-ckpt/plugins/openclaw/"
detect = { binary = "openclaw" }

[adapters.bundle]
schema = 1
entry = "openclaw.plugin.json"

[adapters.openclaw.bundle]
schema = 1
entry = "openclaw.plugin.json"

[[adapters]]
framework = "hermes"
name = "ws-ckpt-hermes"
display_name = "ws-ckpt for Hermes"
adapter_type = "plugin"
trust = "first-party"
plugin_id = "ws-ckpt"
source = "scripts/hermes"
dest = "{datadir}/runtime/ws-ckpt/plugins/hermes/"
detect = { binary = "hermes" }

[adapters.bundle]
schema = 1
entry = "plugin.yaml"

[adapters.hermes.bundle]
schema = 1
entry = "plugin.yaml"
