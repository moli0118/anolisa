sensitive_file_paths:
  - /etc/shadow
  - /etc/gshadow
  - ~/\.ssh
  - /etc/ssh/
  - ~/\.gnupg
  - \.env\b
  - /etc/machine-id
  - /etc/passwd
  - /etc/sudoers
  - /etc/pam\.d/
  - /etc/security/
  - /etc/sysctl\.conf
  - /etc/sysctl\.d/
  - /boot/
  - /usr/lib/systemd/
  - /etc/systemd/system/
  - /etc/group
  - /etc/hostname
  - /etc/hosts
  - /etc/crontab
  - /etc/cron\.d/
  - /var/spool/cron/
  - ~/\.bash_history
  - ~/\.zsh_history
  - /etc/kubernetes/
  - kubeconfig
