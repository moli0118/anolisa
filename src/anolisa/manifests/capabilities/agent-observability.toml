[capability]
name = "agent-observability"
description = "Agent behavior tracing and token attribution"

[implementation]
components = ["agentsight"]
features.agentsight = ["token_counting", "ebpf_tracing"]

[requires_env]
os = "linux"
arch = ["x86_64"]
# ebpf_tracing feature additionally requires CAP_BPF; gated at the feature level.
