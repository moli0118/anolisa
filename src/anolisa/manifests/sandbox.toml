# sandbox.toml — osbase sandbox scenario registry
# 用户可编辑：添加/删除 scenario、修改包名、调整内核要求

manifest_version = 2

[[scenario]]
name = "runc"
packages = []
requires_kvm = false
requires_kernel = ">=4.5"

[[scenario]]
name = "rund"
packages = ["kata-containers-rund"]
requires_kvm = true
requires_kernel = ">=5.10"

[[scenario]]
name = "firecracker"
packages = ["firecracker", "firecracker-jailer"]
packages_optional = ["firecracker-kernel", "firecracker-rootfs"]
requires_kvm = true
requires_kernel = ">=4.14"

[[scenario]]
name = "gvisor"
packages = ["gvisor"]
requires_kvm = false
requires_kernel = ">=5.10"

[[scenario]]
name = "landlock"
packages = []
requires_kvm = false
requires_kernel = ">=5.13"
