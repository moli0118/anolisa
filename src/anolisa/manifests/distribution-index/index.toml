# DistributionIndex (schema v1).
#
# Flat `[[entries]]` form consumed by anolisa-core::distribution::DistributionIndex.
# One row per (component, version, channel, target) artifact binding. Concrete
# artifact URL / checksum / signature / backend live here, never in component
# manifests.
#
# This index carries real raw/tar_gz release entries for published
# components. Keep URLs real: a matching row becomes a live HTTP(S)
# request as soon as a Linux host resolves it.

schema_version = 1
channel = "stable"
publisher = "anolisa"

[[entries]]
component = "cosh"
version = "2.4.1"
channel = "stable"
artifact_id = "copilot-shell-2.4.1-linux-x86_64-tar"
artifact_type = "tar_gz"
backend = "raw"
url = "https://anolisa.oss-cn-hangzhou-internal.aliyuncs.com/releases/stable/copilot-shell/2.4.1/copilot-shell-2.4.1-linux-x86_64.tar.gz"
os = "linux"
arch = "x86_64"
libc = "glibc"
install_modes = ["system"]
sha256 = "e1ac72ba1b6ef67f10f5dbd164f3077eee04cd6404f96acacf6bab7f5d392c1d"
size = 5473797

# tokenless 0.5.0 — Linux x86_64 tarball (user + system mode).
# Full published artifact: one tar.gz carrying `.anolisa/component.toml`,
# `bin/tokenless`, the libexec helpers `rtk` + `toon`, and the
# `share/anolisa/adapters/tokenless/` tree. ANOLISA `enable` installs only the
# three binaries declared in the component contract; the adapter resources ride
# along for the Adapter layer to deploy separately.
# No `libc` selector → resolves on any libc; `backend = "raw"` is a plain
# HTTPS GET of `url`. The planner queries with `version = None`, so this row
# wins by highest-semver regardless of the bundled manifest's version.
[[entries]]
component = "tokenless"
version = "0.5.0"
channel = "stable"
artifact_id = "tokenless-0.5.0-linux-x86_64-tar"
artifact_type = "tar_gz"
backend = "raw"
url = "https://anolisa.oss-cn-hangzhou.aliyuncs.com/anolisa-releases/anolisa/v1/tokenless/0.5.0/tokenless-0.5.0-linux-x86_64.tar.gz"
os = "linux"
arch = "x86_64"
install_modes = ["user", "system"]
sha256 = "73428694c5077f61e106836f1cf44b1f016677ef2e0af377908e0037377469d2"
size = 8110269
